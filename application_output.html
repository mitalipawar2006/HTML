<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Result Dashboard</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:'Poppins', sans-serif;
            min-height:100vh;
            background:linear-gradient(135deg, #141e30, #243b55);
            display:flex;
            justify-content:center;
            align-items:center;
            padding:30px;
        }

        /* MAIN CONTAINER */

        .container{
            width:100%;
            max-width:1200px;
            background:rgba(255,255,255,0.1);
            backdrop-filter:blur(15px);
            border-radius:30px;
            padding:40px;
            box-shadow:0 15px 40px rgba(0,0,0,0.35);
            border:1px solid rgba(255,255,255,0.15);
        }

        /* HEADER */

        .header{
            text-align:center;
            margin-bottom:35px;
            color:white;
        }

        .header h1{
            font-size:50px;
            margin-bottom:10px;
            letter-spacing:1px;
        }

        .header p{
            font-size:17px;
            opacity:0.9;
        }

        .student-info{
            text-align:center;
            color:white;
            margin-bottom:25px;
            line-height:1.8;
        }

        /* TABLE */

        .table-box{
            overflow-x:auto;
        }

        table{
            width:100%;
            border-collapse:collapse;
            overflow:hidden;
            border-radius:20px;
            background:white;
            box-shadow:0 10px 25px rgba(0,0,0,0.2);
        }

        th{
            background:linear-gradient(135deg, #7f00ff, #e100ff);
            color:white;
            padding:20px;
            font-size:18px;
            text-transform:uppercase;
            letter-spacing:1px;
        }

        td{
            padding:18px;
            text-align:center;
            font-size:16px;
            color:#333;
            border-bottom:1px solid #eee;
        }

        tr:nth-child(even){
            background:#f8f9ff;
        }

        tr:hover{
            background:#eef2ff;
            transition:0.3s;
        }

        /* RESULT BADGES */

        .pass{
            background:#22c55e;
            color:white;
            padding:8px 16px;
            border-radius:20px;
            font-size:14px;
            font-weight:600;
        }

        .fail{
            background:#ef4444;
            color:white;
            padding:8px 16px;
            border-radius:20px;
            font-size:14px;
            font-weight:600;
        }

        /* MARKS STYLE */

        .marks-high{
            color:#16a34a;
            font-weight:bold;
        }

        .marks-medium{
            color:#ca8a04;
            font-weight:bold;
        }

        .marks-low{
            color:#dc2626;
            font-weight:bold;
        }

        /* NAVIGATION */

        .nav-container{
            margin-top:35px;
            display:flex;
            justify-content:flex-start;
        }

        .nav-btn{
            text-decoration:none;
            background:linear-gradient(135deg, #ff512f, #dd2476);
            color:white;
            padding:16px 28px;
            border-radius:18px;
            font-size:17px;
            font-weight:600;
            transition:0.35s;
        }

        .nav-btn:hover{
            transform:translateY(-5px) scale(1.03);
            box-shadow:0 12px 20px rgba(0,0,0,0.25);
        }

        /* RESPONSIVE */

        @media(max-width:768px){

            .container{
                padding:25px;
            }

            .header h1{
                font-size:34px;
            }

            th, td{
                padding:14px;
                font-size:14px;
            }
        }

    </style>

</head>

<body>

    <div class="container">

        <!-- STUDENT INFO -->

        <div class="student-info">

            <h3>Name: Mitali Pawar</h3>
            <h3>Roll No: 29</h3>
            <h3>Branch: CSE(A)</h3>

        </div>

        <!-- HEADER -->

        <div class="header">

            <h1>Student Result Dashboard</h1>

            <p>
                Academic performance and result analysis of students
            </p>

        </div>

        <!-- TABLE -->

        <div class="table-box">

            <table>

                <tr>
                    <th>Name</th>
                    <th>Roll No</th>
                    <th>Marks</th>
                    <th>Result</th>
                </tr>

                <tr>
                    <td>Mitali Pawar</td>
                    <td>29</td>
                    <td class="marks-high">92</td>
                    <td>
                        <span class="pass">PASS</span>
                    </td>
                </tr>

                <tr>
                    <td>Rohit Patil</td>
                    <td>202</td>
                    <td class="marks-medium">67</td>
                    <td>
                        <span class="pass">PASS</span>
                    </td>
                </tr>

                <tr>
                    <td>Sakshi Jadhav</td>
                    <td>203</td>
                    <td class="marks-low">34</td>
                    <td>
                        <span class="fail">FAIL</span>
                    </td>
                </tr>

            </table>

        </div>

        <!-- NAVIGATION -->

        <div class="nav-container">

            <a href="../assignment12/studentoutput.html"
               class="nav-btn">

                ⬅ Previous Assignment

            </a>

            <a href="../index.html"
               class="nav-btn"
               style="margin-left:16px;background:linear-gradient(135deg, #06b6d4, #0ea5e9);">

                Next ➜ Home

            </a>

        </div>

    </div>

</body>

</html>
