<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Employee Registration</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins', sans-serif;
    background:#f1f5f9;
    min-height:100vh;
    padding:40px 20px;
    color:#1e293b;
}

/* MAIN CONTAINER */

.wrapper{
    max-width:1100px;
    margin:auto;
}

/* FORM CARD */

.container{
    background:white;
    border-radius:28px;
    overflow:hidden;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

/* HEADER */

.header{
    background:linear-gradient(135deg,#2563eb,#4f46e5);
    color:white;
    padding:45px;
}

.header h1{
    font-size:42px;
    margin-bottom:10px;
}

.header p{
    opacity:0.9;
    line-height:1.7;
    max-width:600px;
}

/* FORM */

.form-area{
    padding:40px;
}

.section-title{
    font-size:15px;
    font-weight:600;
    color:#2563eb;
    margin:30px 0 18px;
    text-transform:uppercase;
    letter-spacing:1px;
}

/* ROWS */

.row{
    display:flex;
    gap:20px;
    margin-bottom:20px;
}

.input-group{
    flex:1;
}

/* LABELS */

label{
    display:block;
    margin-bottom:8px;
    font-size:14px;
    font-weight:500;
    color:#334155;
}

/* INPUTS */

input,
select,
textarea{
    width:100%;
    padding:14px 16px;
    border:1px solid #dbeafe;
    border-radius:14px;
    background:#f8fafc;
    font-size:14px;
    font-family:'Poppins', sans-serif;
    transition:0.3s;
    outline:none;
}

input:focus,
select:focus,
textarea:focus{
    border-color:#2563eb;
    background:white;
    box-shadow:0 0 0 4px rgba(37,99,235,0.1);
}

/* OPTION BUTTONS */

.option-group{
    display:flex;
    flex-wrap:wrap;
    gap:12px;
    margin-top:8px;
}

.option-group input{
    display:none;
}

.option-group label{
    padding:10px 18px;
    border-radius:30px;
    border:1px solid #cbd5e1;
    background:#f8fafc;
    cursor:pointer;
    transition:0.3s;
    font-size:13px;
}

.option-group input:checked + label{
    background:#2563eb;
    color:white;
    border-color:#2563eb;
}

/* BUTTONS */

.btn-group{
    display:flex;
    gap:18px;
    margin-top:35px;
}

button{
    flex:1;
    padding:15px;
    border:none;
    border-radius:14px;
    font-size:15px;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
}

.primary{
    background:linear-gradient(135deg,#2563eb,#4f46e5);
    color:white;
}

.primary:hover{
    transform:translateY(-3px);
    box-shadow:0 10px 20px rgba(37,99,235,0.2);
}

.secondary{
    background:#e2e8f0;
    color:#1e293b;
}

.secondary:hover{
    background:#cbd5e1;
}

/* NAVIGATION */

.nav-container{
    display:flex;
    justify-content:space-between;
    gap:20px;
    margin-top:25px;
}

.nav-btn{
    flex:1;
    text-align:center;
    text-decoration:none;
    padding:15px;
    border-radius:14px;
    font-size:15px;
    font-weight:600;
    transition:0.3s;
}

.prev-btn{
    background:#e2e8f0;
    color:#1e293b;
}

.next-btn{
    background:#2563eb;
    color:white;
}

.nav-btn:hover{
    transform:translateY(-2px);
}

/* RESPONSIVE */

@media(max-width:768px){

    .header{
        padding:30px;
    }

    .header h1{
        font-size:32px;
    }

    .form-area{
        padding:25px;
    }

    .row{
        flex-direction:column;
        gap:15px;
    }

    .btn-group,
    .nav-container{
        flex-direction:column;
    }
}

</style>
</head>

<body>

<div class="wrapper">

    <!-- FORM CARD -->

    <div class="container">

        <!-- HEADER -->

        <div class="header">

            <h1>Employee Registration</h1>

            <p>
                Fill in employee details to create a professional
                registration profile in the management system.
            </p>

        </div>

        <!-- FORM AREA -->

        <div class="form-area">

            <form>

                <!-- PERSONAL INFO -->

                <div class="section-title">
                    Personal Information
                </div>

                <div class="row">

                    <div class="input-group">
                        <label>First Name</label>
                        <input type="text" placeholder="Enter First Name">
                    </div>

                    <div class="input-group">
                        <label>Last Name</label>
                        <input type="text" placeholder="Enter Last Name">
                    </div>

                </div>

                <div class="row">

                    <div class="input-group">
                        <label>Email Address</label>
                        <input type="email" placeholder="Enter Email">
                    </div>

                    <div class="input-group">
                        <label>Phone Number</label>
                        <input type="tel" placeholder="Enter Phone Number">
                    </div>

                </div>

                <!-- JOB DETAILS -->

                <div class="section-title">
                    Job Details
                </div>

                <div class="row">

                    <div class="input-group">
                        <label>Employee ID</label>
                        <input type="text" placeholder="EMP-001">
                    </div>

                    <div class="input-group">
                        <label>Department</label>

                        <select>
                            <option>Select Department</option>
                            <option>Human Resources</option>
                            <option>Information Technology</option>
                            <option>Finance</option>
                            <option>Marketing</option>
                        </select>
                    </div>

                </div>

                <div class="row">

                    <div class="input-group">
                        <label>Position</label>
                        <input type="text" placeholder="Job Position">
                    </div>

                    <div class="input-group">
                        <label>Joining Date</label>
                        <input type="date">
                    </div>

                </div>

                <!-- ADDITIONAL INFO -->

                <div class="section-title">
                    Additional Information
                </div>

                <label>Gender</label>

                <div class="option-group">

                    <input type="radio" id="male" name="gender">
                    <label for="male">Male</label>

                    <input type="radio" id="female" name="gender">
                    <label for="female">Female</label>

                    <input type="radio" id="other" name="gender">
                    <label for="other">Other</label>

                </div>

                <br>

                <label>Skills</label>

                <div class="option-group">

                    <input type="checkbox" id="skill1">
                    <label for="skill1">Communication</label>

                    <input type="checkbox" id="skill2">
                    <label for="skill2">Leadership</label>

                    <input type="checkbox" id="skill3">
                    <label for="skill3">Programming</label>

                    <input type="checkbox" id="skill4">
                    <label for="skill4">Management</label>

                </div>

                <br>

                <label>Upload Resume</label>
                <input type="file">

                <br><br>

                <label>Address</label>
                <textarea rows="4" placeholder="Enter Full Address"></textarea>

                <!-- BUTTONS -->

                <div class="btn-group">

                    <button type="reset" class="secondary">
                        Reset Form
                    </button>

                    <button type="submit" class="primary">
                        Register Employee
                    </button>

                </div>

            </form>

        </div>

    </div>

    <!-- NAVIGATION -->

    <div class="nav-container">

        <a href="experiment8.html"
           class="nav-btn prev-btn">

            ⬅ Previous Assignment

        </a>

        <a href="experiment10.html"
           class="nav-btn next-btn">

            Next Assignment ➜

        </a>

    </div>

</div>

</body>
</html>
